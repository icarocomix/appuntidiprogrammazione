# ==========================================
# 1. INFORMAZIONI GENERALI
# ==========================================
title: DevLog
email: cosimociraci@gmail.com
description: >-
  Hub tecnico per appunti di programmazione, analisi di problemi reali 
  e soluzioni implementative in ambito Spring Boot, Java e Web Dev.

# ==========================================
# 2. CONFIGURAZIONE URL (GitHub Pages)
# ==========================================
baseurl: "/appuntidiprogrammazione"
url: "https://icarocomix.github.io"
theme: null

# NOTA — future: true è necessario per questo schema di pubblicazione.
#
# Con future: false (default) Jekyll esclude dal build i post la cui
# data+ORA è > site.time. Un articolo datato "2026-04-05 15:05:50"
# verrebbe escluso se il build gira alle 00:05 UTC del 05/04
# (00:05 < 15:05), rompendo la pubblicazione giornaliera.
#
# Tenendo future: true Jekyll builda TUTTI i post, e la responsabilità
# del filtraggio passa all'index.html, dove confronto solo
# la parte YYYY-MM-DD di post.date e site.time — eliminando
# l'ambiguità dell'ora e del fuso orario.
future: true

# ==========================================
# 3. BACKEND & AUTENTICAZIONE (Decap CMS)
# ==========================================
backend:
  name: github
  repo: icarocomix/appuntidiprogrammazione
  branch: main
  base_url: https://api.staticcms.org
  auth_endpoint: /auth

local_backend: true
publish_mode: editorial_workflow

# ==========================================
# 4. GESTIONE CONTENUTI (Collections)
# ==========================================
collections:
  articoli:
    output: true
    permalink: /articoli/:title/

defaults:
  - scope:
      path: ""
      type: "articoli"
    values:
      layout: "post"

# ==========================================
# 5. MOTORE DI RENDERING & HIGHLIGHTING
# ==========================================
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      wrap: true

# ==========================================
# 6. ESCLUSIONI (File ignorati da Jekyll)
# ==========================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - .jekyll-cache/