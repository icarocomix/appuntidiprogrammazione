# ==========================================
# 1. INFORMAZIONI GENERALI
# ==========================================
title: DevLog
email: cosimociraci@gmail.com
description: >-
  Hub tecnico per appunti di programmazione, analisi di problemi reali 
  e soluzioni implementative in ambito Spring Boot, Java e Web Dev.

# ==========================================
# 2. CONFIGURAZIONE URL (GitHub Pages)
# ==========================================
baseurl: "/appuntidiprogrammazione"
url: "https://cosimociraci.github.io"
future: true

# ==========================================
# 3. BACKEND & AUTENTICAZIONE (Decap CMS)
# ==========================================
backend:
  name: github
  repo: cosimociraci/appuntidiprogrammazione
  branch: main
  base_url: https://api.staticcms.org
  auth_endpoint: /auth

local_backend: true
publish_mode: editorial_workflow

# ==========================================
# 4. GESTIONE CONTENUTI (Collections)
# ==========================================
collections:
  articoli:
    output: true
    permalink: /articoli/:title/

# Impostazioni di default per i file nella cartella _articoli
defaults:
  - scope:
      path: ""
      type: "articoli"
    values:
      layout: "post"

# ==========================================
# 5. MOTORE DI RENDERING & HIGHLIGHTING
# ==========================================
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      wrap: true

# ==========================================
# 6. ESCLUSIONI (File ignorati da Jekyll)
# ==========================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - .jekyll-cache/