# ==========================================
# 1. INFORMAZIONI GENERALI
# ==========================================
title: DevLog
email: cosimociraci@gmail.com
description: >-
  Hub tecnico per appunti di programmazione, analisi di problemi reali 
  e soluzioni implementative in ambito Spring Boot, Java e Web Dev.

# ==========================================
# 2. CONFIGURAZIONE URL (GitHub Pages)
# ==========================================
baseurl: "/appuntidiprogrammazione"
url: "https://cosimociraci.github.io"

# ==========================================
# 3. BACKEND & AUTENTICAZIONE (Decap CMS)
# ==========================================
# Questa sezione permette al CMS di parlare con GitHub tramite il proxy
backend:
  name: github
  repo: cosimociraci/appuntidiprogrammazione
  branch: main
  base_url: https://api.staticcms.org
  auth_endpoint: /auth

# Consente di lavorare in locale col comando: npx decap-server
local_backend: true
publish_mode: editorial_workflow # Opzionale: permette di salvare bozze

# ==========================================
# 4. GESTIONE CONTENUTI (Collections)
# ==========================================
collections:
  articoli:
    output: true
    permalink: /articoli/:title/

# Impostazioni di default per i nuovi file creati
defaults:
  - scope:
      path: ""
      type: "articoli"
    values:
      layout: "post"

# ==========================================
# 5. MOTORE DI RENDERING & HIGHLIGHTING
# ==========================================
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# ==========================================
# 6. ESCLUSIONI (File ignorati da Jekyll)
# ==========================================
# NOTA: La cartella 'admin/' NON deve essere qui, altrimenti GitHub Pages dà 404
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/          # Escludiamo i workflow dalla build del sito finale
  - .jekyll-cache/