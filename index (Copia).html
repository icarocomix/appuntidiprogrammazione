---
layout: default
title: Home
---

<div class="container">
    <nav class="tag-nav" id="dynamic-tags">
        <button class="tag-btn active" onclick="filterByTag('tutti', this)">Tutti</button>
        </nav>

    <section class="search-section">
        <input type="text" id="search-bar" placeholder="Cerca negli appunti..." onkeyup="applyFilters()">
    </section>

    <main class="post-grid" id="post-grid">
        {% for post in site.articoli %}
        <article class="post-item" 
                 data-tags="{{ post.tags | join: ',' | slugify }}" 
                 data-title="{{ post.title | downcase }}">
            <div class="post-meta">{{ post.tech | upcase }} • {{ post.date | date: "%d/%m/%Y" }}</div>
            <h2 class="post-title">
                <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            </h2>
            <p class="post-sintesi">{{ post.sintesi }}</p>
        </article>
        {% endfor %}
    </main>
</div>

<script>
    // 1. Generazione dinamica dei tag all'avvio (lato client)
    document.addEventListener('DOMContentLoaded', () => {
        const articles = document.querySelectorAll('.post-item');
        const tagContainer = document.getElementById('dynamic-tags');
        const allTags = new Set();

        articles.forEach(article => {
            const tags = article.getAttribute('data-tags').split('-'); // slugify usa '-'
            tags.forEach(t => { if(t) allTags.add(t) });
        });

        allTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.innerText = tag.toUpperCase();
            btn.onclick = (e) => filterByTag(tag, e.target);
            tagContainer.appendChild(btn);
        });
    });

    let activeTag = 'tutti';

    function filterByTag(tag, btn) {
        activeTag = tag.toLowerCase();
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const query = document.getElementById('search-bar').value.toLowerCase();
        const articles = document.querySelectorAll('.post-item');

        articles.forEach(article => {
            const title = article.getAttribute('data-title');
            const tags = article.getAttribute('data-tags');
            const matchesTag = (activeTag === 'tutti' || tags.includes(activeTag));
            const matchesSearch = title.includes(query);
            article.style.display = (matchesTag && matchesSearch) ? "block" : "none";
        });
    }
</script>
