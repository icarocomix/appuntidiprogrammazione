<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevrotain — DevLog</title>
    <meta name="description" content="Hub tecnico per appunti di programmazione, analisi di problemi reali  e soluzioni implementative in ambito Spring Boot, Java e Web Dev.">
    <link rel="stylesheet" href="/appuntidiprogrammazione/assets/css/style.css">

    <script>
        /*
         * Applico il tema PRIMA del rendering per evitare il flash di contenuto
         * (FOUC). Lo script è inline e bloccante di proposito: deve girare
         * prima che il browser disegni qualsiasi elemento.
         */
        (function() {
            var saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>
<body>

    <header class="main-header">
        <div class="logo" onclick="window.location.href='/appuntidiprogrammazione/'">
            APPUNTI DI <span>PROGRAMMAZIONE</span>
        </div>

        <!-- 
            Il pulsante aggiorna l'attributo data-theme sull'<html> e
            persiste la scelta nel localStorage per le sessioni future.
        -->
        <button onclick="toggleTheme()" class="theme-toggle" aria-label="Cambia tema">🌓</button>
    </header>

    <h1 id="chevrotain">Chevrotain</h1>

<p>For details see:</p>

<ul>
  <li>Chevrotain’s <a href="https://chevrotain.io/docs/">website</a>.</li>
  <li>Chevrotain’s root <a href="https://github.com/chevrotain/chevrotain">README</a>.</li>
</ul>

<h2 id="install">Install</h2>

<div class="language-sh highlighter-rouge"><div class="highlight"><pre class="highlight"><code><table class="rouge-table"><tbody><tr><td class="rouge-gutter gl"><pre class="lineno">1
</pre></td><td class="rouge-code"><pre>npm <span class="nb">install </span>chevrotain
</pre></td></tr></tbody></table></code></pre></div></div>

<p>or using yarn:</p>

<div class="language-sh highlighter-rouge"><div class="highlight"><pre class="highlight"><code><table class="rouge-table"><tbody><tr><td class="rouge-gutter gl"><pre class="lineno">1

</pre></td></tr></tbody></table></code></pre></div></div>


    <footer class="main-footer">
        DevLog — Appunti di Programmazione &nbsp;·&nbsp; cosimociraci@gmail.com
    </footer>

    <script>
        /*
         * toggleTheme: legge il tema corrente dall'attributo HTML,
         * calcola l'opposto e lo salva. Il CSS reagisce via [data-theme].
         * Non uso classi sul body per mantenere tutto centralizzato
         * sull'elemento radice.
         */
        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
    </script>

</body>
</html>
