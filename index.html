---
layout: default
title: DevLog - Appunti di Programmazione
---

<div class="container">
    <header class="main-header">
        <div class="logo" onclick="window.location.href='{{ '/' | relative_url }}'">
            APPUNTI DI <span>PROGRAMMAZIONE.</span>
        </div>
        <button onclick="toggleTheme()" id="theme-btn" class="theme-toggle">🌙</button>
    </header>

    <nav class="tag-nav">
        <button class="tag-btn active" onclick="filterByTag('tutti')">Tutti</button>
        <button class="tag-btn" onclick="filterByTag('java')">Java</button>
        <button class="tag-btn" onclick="filterByTag('sql')">SQL</button>
    </nav>

    <main class="bento-grid">
        {% for post in site.posts %}
        <article class="article-card" data-tags="{{ post.tags | join: ',' | downcase }}">
            <div class="card-content">
                <h2 class="article-title">
                    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
                </h2>
                <p class="sintesi">{{ post.sintesi | truncate: 120 }}</p>
            </div>
            
            {% if post.codice_mini %}
            <div class="code-mini">
                <code>{{ post.codice_mini | escape }}</code>
            </div>
            {% endif %}
        </article>
        {% endfor %}
    </main>
</div>

<script>
    /**
     * Filtra gli articoli basandosi sul testo inserito nella barra di ricerca
     */
    function filterArticles() {
        const query = document.getElementById('search-bar').value.toLowerCase();
        const articles = document.querySelectorAll('.article-card');

        articles.forEach(article => {
            const title = article.getAttribute('data-title');
            const tags = article.getAttribute('data-tags');
            
            if (title.includes(query) || tags.includes(query)) {
                article.style.display = "block";
            } else {
                article.style.display = "none";
            }
        });
    }

    /**
     * Filtra gli articoli cliccando sui pulsanti dei Tag
     */
    function filterByTag(tag) {
        const articles = document.querySelectorAll('.article-card');
        const buttons = document.querySelectorAll('.tag-btn');
        const cleanTag = tag.toLowerCase().trim();

        // Aggiorna stile bottoni
        buttons.forEach(b => {
            if(b.textContent.toLowerCase().trim() === cleanTag) b.classList.add('active');
            else b.classList.remove('active');
        });

        // Filtra articoli
        articles.forEach(article => {
            const articleTags = article.getAttribute('data-tags') || "";
            if (cleanTag === 'tutti' || articleTags.includes(cleanTag)) {
                article.style.display = 'flex';
            } else {
                article.style.display = 'none';
            }
        });
    }
</script>
