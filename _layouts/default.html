<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.time | relative_url }}">
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        
        // Applica tema salvato
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <header class="main-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; left: 210px; position: relative;">
        <div class="logo" onclick="window.location.href='{{ '/' | relative_url }}'">
            APPUNTI DI <span>PROGRAMMAZIONE</span>
        </div>
        <button onclick="toggleTheme()" class="theme-toggle">🌓</button>
    </header>

    {{ content }}
</body>
</html>
