<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header container">
        <div class="logo" onclick="window.location.href='{{ '/' | relative_url }}'">
            APPUNTI DI <span>PROGRAMMAZIONE.</span>
        </div>
        <button onclick="toggleTheme()" id="theme-btn" class="theme-toggle">☀️</button>
    </header>

    {{ content }}

    <script>
        // Gestione Tema Globale
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', next);
            btn.innerHTML = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', next);
        }

        // Caricamento preferenza tema
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.addEventListener('DOMContentLoaded', () => {
                const btn = document.getElementById('theme-btn');
                if (btn) btn.innerHTML = savedTheme === 'dark' ? '☀️' : '🌙';
            });
        })();
    </script>
</body>
</html>
